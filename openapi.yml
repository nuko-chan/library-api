openapi: 3.0.3
info:
  title: Library API
  version: 1.0.0
  description: >
    蔵書管理 API。Express + TypeScript + Prisma で構成。
servers:
  - url: http://localhost:3000
    description: local

tags:
  - name: Users
  - name: Books
  - name: Loans

paths:
  /users:
    post:
      tags: [Users]
      summary: ユーザー作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books:
    post:
      tags: [Books]
      summary: 書籍作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/{id}:
    get:
      tags: [Books]
      summary: 書籍ID検索
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /loans:
    post:
      tags: [Loans]
      summary: 書籍貸し出し
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Loan'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /loans/return:
    post:
      tags: [Loans]
      summary: 書籍返却
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnLoanRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnLoanResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    CreateUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    CreateBookRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Clean Architecture

    CreateLoanRequest:
      type: object
      required: [bookId, userId]
      properties:
        bookId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid

    ReturnLoanRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    User:
      type: object
      required: [id, email, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Book:
      type: object
      required: [id, title, isAvailable, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Loan:
      type: object
      required: [id, bookId, userId, loanDate, dueDate, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        bookId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        loanDate:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReturnLoanResponse:
      type: object
      required: [id, returnDate, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        returnDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
